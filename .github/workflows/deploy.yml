name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist (SEO files + dotfiles)
        run: |
          echo "=== dist root files ==="
          ls -la dist/
          echo "=== checking key files ==="
          for f in .nojekyll llms.txt llms-full.txt robots.txt sitemap.xml; do
            if [ -f "dist/$f" ]; then echo "OK: dist/$f"; else echo "MISSING: dist/$f"; fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create tar artifact (include dotfiles)
        run: |
          tar \
            --dereference --hard-dereference \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            -C ./dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
