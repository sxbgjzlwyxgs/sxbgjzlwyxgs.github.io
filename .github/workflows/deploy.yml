name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist contents
        run: |
          echo "=== all files in dist ==="
          ls -laR dist/
          echo "=== checking key SEO files ==="
          for f in .nojekyll llms.txt llms-full.txt robots.txt sitemap.xml index.html; do
            if [ -f "dist/$f" ]; then
              echo "OK: dist/$f ($(wc -c < dist/$f) bytes)"
            else
              echo "MISSING: dist/$f"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed URLs
        run: |
          echo "Waiting 60s for Pages CDN to propagate..."
          sleep 60
          BASE="${{ steps.deployment.outputs.page_url }}"
          echo "Base URL: $BASE"
          for path in llms.txt llms-full.txt robots.txt sitemap.xml; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "${BASE}${path}" || echo "000")
            echo "${path}: HTTP ${HTTP_CODE}"
          done
